<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <link rel="stylesheet" href="/style.css">
  
  <!-- Load redirects database -->
  <script src="/redirects.js"></script>

  <script>
    // Extract path and execute redirect as early as possible
    (function() {
      // Split path and get the first segment
      const pathParts = window.location.pathname.split('/').filter(p => p);
      
      if (pathParts.length > 0) {
        // Look at the first path part (or last, e.g., if they added trailing slash or extension)
        let key = pathParts[0].toLowerCase().trim();
        
        // Remove trailing .html or .php in case they manually typed it
        key = key.replace(/\.(html|php|txt)$/, '');
        
        if (typeof REDIRECTS !== 'undefined' && REDIRECTS[key]) {
          const destination = REDIRECTS[key].url;
          window.location.replace(destination);
          
          // Show fast loading screen during transition
          document.write(`
            <div class="loader-panel" id="loader-panel">
              <div class="spinner"></div>
              <h2 class="loader-title">Redirecting to ${REDIRECTS[key].title}...</h2>
              <p class="loader-sub">Taking you to: <code>${destination}</code></p>
            </div>
          `);
        } else {
          // Key was not found, save it to show in the 404 message
          window.missingKey = key;
        }
      }
    })();
  </script>
</head>
<body>

  <div class="container">
    <main class="error-card">
      <div class="error-badge">404</div>
      <h1 class="error-title">Link Not Found</h1>
      <p class="error-text">
        The shortcut link <code id="missing-path" style="background: rgba(255, 255, 255, 0.08); padding: 2px 6px; border-radius: 4px; color: var(--color-primary);"></code> could not be found or has been moved.
      </p>

      <!-- Search suggestion panel -->
      <div class="suggestions" id="suggestions-box" style="display: none;">
        <h2 class="suggestions-title">Did you mean one of these?</h2>
        <div class="links-grid" id="suggestions-container" style="margin-top: 10px;">
          <!-- Suggestions injected here -->
        </div>
      </div>

      <div style="margin-top: 20px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;">
        <a href="/" class="btn-home" id="btn-back-home">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" style="margin-right: 4px;"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
          Go to Links Portal
        </a>
      </div>
    </main>
    
    <footer>
      <p>&copy; Metal Fortress. View repository on <a href="/github">GitHub</a></p>
    </footer>
  </div>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      document.title = "404 - Link Not Found";
      
      const missingKey = window.missingKey || "";
      const pathEl = document.getElementById('missing-path');
      pathEl.textContent = missingKey ? `/${missingKey}` : window.location.pathname;

      if (missingKey && typeof REDIRECTS !== 'undefined') {
        findSuggestions(missingKey);
      }
    });

    function findSuggestions(key) {
      const suggestionsContainer = document.getElementById('suggestions-container');
      const suggestionsBox = document.getElementById('suggestions-box');
      
      suggestionsContainer.innerHTML = '';
      
      // Look for fuzzy matches (substring match, start-with, edit-distance-like)
      const matches = Object.entries(REDIRECTS).filter(([rKey, rData]) => {
        return rKey.includes(key) || 
               key.includes(rKey) || 
               rData.title.toLowerCase().includes(key) ||
               rData.category.toLowerCase().includes(key);
      });
      
      if (matches.length > 0) {
        suggestionsBox.style.display = 'block';
        
        // Show up to 3 close matches
        matches.slice(0, 3).forEach(([rKey, rData]) => {
          const card = document.createElement('a');
          card.href = rData.url;
          card.className = 'link-card';
          card.id = `suggest-${rKey}`;
          
          const iconSvg = ICONS[rData.icon] || ICONS['music'];
          
          card.innerHTML = `
            <div class="link-icon-container">
              ${iconSvg}
            </div>
            <div class="link-info">
              <span class="link-title">${rData.title}</span>
              <span class="link-desc">${rData.description}</span>
            </div>
            <svg class="link-arrow" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg>
          `;
          
          suggestionsContainer.appendChild(card);
        });
      }
    }
  </script>
</body>
</html>
